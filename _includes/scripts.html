<!-- Enhanced Navigation & UX Scripts -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    });
  });

  // Add animation on scroll
  const observerOptions = {
    threshold: 0.1,
    rootMargin: '0px 0px -50px 0px'
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
      }
    });
  }, observerOptions);

  // Observe elements for scroll animations
  document.querySelectorAll('.paper-box, .experience-item, .education-item, .award-item, .skill-category').forEach(el => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(20px)';
    el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
    observer.observe(el);
  });

  // Active navigation highlighting
  const sections = document.querySelectorAll('h1[id]');
  const navLinks = document.querySelectorAll('.masthead__menu-item a');

  window.addEventListener('scroll', () => {
    let current = '';
    sections.forEach(section => {
      const sectionTop = section.offsetTop;
      const sectionHeight = section.clientHeight;
      if (pageYOffset >= sectionTop - 200) {
        current = section.getAttribute('id');
      }
    });

    navLinks.forEach(link => {
      link.classList.remove('active');
      if (link.getAttribute('href').includes(current)) {
        link.classList.add('active');
      }
    });
  });

  // Copy code utility
  document.querySelectorAll('div.highlighter-rouge, figure.highlight').forEach(function(codeBlock) {
    var button = document.createElement('button');
    button.className = 'copy-btn';
    button.type = 'button';
    button.ariaLabel = 'Copy code to clipboard';
    button.innerText = 'Copy';

    codeBlock.appendChild(button);

    button.addEventListener('click', function() {
      var code = codeBlock.querySelector('code');
      // Replace non-breaking spaces with actual spaces and get the text
      var text = code.innerText;

      navigator.clipboard.writeText(text).then(function() {
        button.innerText = 'Copied!';
        button.style.backgroundColor = '#98c379'; // Green matching the theme
        button.style.color = '#fff';
        
        setTimeout(function() {
          button.innerText = 'Copy';
          button.style.backgroundColor = '';
          button.style.color = '';
        }, 2000);
      }).catch(function(err) {
        console.error('Failed to copy: ', err);
        button.innerText = 'Failed';
      });
    });
  });
});
</script>

<style>
.masthead__menu-item a.active {
  color: #2563eb;
}
.masthead__menu-item a.active::after {
  width: 100%;
}
</style>
